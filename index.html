<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frogger</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a3a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Courier New',monospace;color:#88ff88}
#hud{display:flex;gap:2rem;margin-bottom:.5rem;font-size:.9rem;letter-spacing:.1em}
canvas{border:2px solid #2a5a2a;box-shadow:0 0 40px rgba(0,200,0,.2)}
#msg{margin-top:.5rem;font-size:.85rem;color:#88ff8866;min-height:1.2rem;text-align:center}
</style>
</head>
<body>
<div id="hud"><span>SCORE <b id="score">0</b></span><span>LIVES <b id="lives">3</b></span><span>LEVEL <b id="level">1</b></span><span>BEST <b id="best">0</b></span></div>
<canvas id="c" width="420" height="480"></canvas>
<div id="msg">Arrow keys or WASD to hop · Reach the lily pads!</div>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
const CELL=42,COLS=10,ROWS=11;
const SAFE_ROWS=[0,5,10];
// row types: 0=goal, 1-4=water(logs), 5=safe, 6-9=road(cars), 10=safe(start)
const ROW_COLORS=['#1a5a2a','#1a3a6a','#1a3a6a','#1a3a6a','#1a3a6a','#2a4a2a','#3a3a3a','#3a3a3a','#3a3a3a','#3a3a3a','#2a4a2a'];
let frog,lanes,score,best=0,lives,level,state,goals,animFrame;

function initLanes(lvl){
  const spd=0.4+lvl*0.15;
  lanes=[
    null, // row 0 goal
    {type:'log',dir:1,speed:spd*0.8,objs:[{x:0,w:3},{x:4,w:2},{x:7,w:3}]},
    {type:'log',dir:-1,speed:spd,objs:[{x:1,w:2},{x:5,w:3}]},
    {type:'log',dir:1,speed:spd*1.2,objs:[{x:0,w:2},{x:3,w:2},{x:7,w:2}]},
    {type:'log',dir:-1,speed:spd*0.7,objs:[{x:2,w:3},{x:6,w:2}]},
    null, // row 5 safe
    {type:'car',dir:-1,speed:spd*1.5,objs:[{x:1,w:1},{x:5,w:1},{x:8,w:1}]},
    {type:'car',dir:1,speed:spd,objs:[{x:0,w:2},{x:4,w:1},{x:7,w:2}]},
    {type:'car',dir:-1,speed:spd*1.2,objs:[{x:2,w:1},{x:6,w:1}]},
    {type:'car',dir:1,speed:spd*0.9,objs:[{x:1,w:1},{x:4,w:2},{x:8,w:1}]},
    null, // row 10 start
  ];
  lanes.forEach(l=>{if(l)l.objs=l.objs.map(o=>({...o,x:o.x*CELL+(Math.random()*20-10)}));});
}

function initFrog(){frog={x:4.5*CELL,y:10*CELL+CELL/2,onLog:null,dead:false,deadTimer:0};}
function initGoals(){goals=[{x:0.5*CELL,filled:false},{x:2.5*CELL,filled:false},{x:4.5*CELL,filled:false},{x:6.5*CELL,filled:false},{x:8.5*CELL,filled:false}];}

function init(lvl=1){level=lvl;score=lvl===1?0:score;lives=lvl===1?3:lives;initLanes(lvl);initFrog();initGoals();state='play';document.getElementById('level').textContent=lvl;}

function drawRow(r){
  ctx.fillStyle=ROW_COLORS[r];ctx.fillRect(0,r*CELL,COLS*CELL,CELL);
  if(r===0){// goal row - lily pads
    goals.forEach(g=>{ctx.fillStyle=g.filled?'#2a8a2a':'#1a6a1a';ctx.beginPath();ctx.ellipse(g.x,CELL/2,CELL/2-4,CELL/2-6,0,0,Math.PI*2);ctx.fill();if(g.filled){ctx.fillStyle='#88ff88';ctx.font='20px serif';ctx.textAlign='center';ctx.fillText('🐸',g.x,CELL/2+7);}});
  }
  if(r===5||r===10){// safe zones - grass markings
    ctx.fillStyle='rgba(0,100,0,.3)';for(let i=0;i<COLS;i+=2)ctx.fillRect(i*CELL,r*CELL,CELL,CELL);
  }
}

function update(){
  if(state!=='play')return;
  lanes.forEach((l,r)=>{
    if(!l)return;
    l.objs.forEach(o=>{
      o.x+=l.dir*l.speed;
      if(l.dir>0&&o.x>COLS*CELL+20)o.x=-o.w*CELL-20;
      if(l.dir<0&&o.x<-o.w*CELL-20)o.x=COLS*CELL+20;
    });
  });
  // frog on log
  const fr=Math.round(frog.y/CELL-0.5);
  if(fr>=1&&fr<=4){
    const l=lanes[fr];let onLog=false;
    l.objs.forEach(o=>{if(frog.x>=o.x+4&&frog.x<=o.x+o.w*CELL-4){onLog=true;frog.x+=l.dir*l.speed;}});
    if(!onLog){die();}
  }
  if(frog.x<0||frog.x>COLS*CELL)die();
  // goal check
  if(fr===0){
    let landed=false;
    goals.forEach(g=>{if(!g.filled&&Math.abs(frog.x-g.x)<20){g.filled=true;score+=50*(level);document.getElementById('score').textContent=score;landed=true;}});
    if(!landed)die();else{initFrog();if(goals.every(g=>g.filled)){score+=100*level;if(level<5)setTimeout(()=>init(level+1),800);else{state='win';document.getElementById('score').textContent=score;}}}
  }
  // car collision
  if(fr>=6&&fr<=9){const l=lanes[fr];l.objs.forEach(o=>{if(frog.x+10>o.x&&frog.x-10<o.x+o.w*CELL)die();});}
}

function die(){if(frog.dead)return;frog.dead=true;lives--;document.getElementById('lives').textContent=lives;if(score>best){best=score;document.getElementById('best').textContent=best;}if(lives<=0){state='over';}else setTimeout(initFrog,600);}

function draw(){
  for(let r=0;r<ROWS;r++)drawRow(r);
  // draw lane objects
  lanes.forEach((l,r)=>{
    if(!l)return;
    l.objs.forEach(o=>{
      if(l.type==='log'){
        ctx.fillStyle='#8B5E2A';ctx.beginPath();ctx.roundRect(o.x,r*CELL+4,o.w*CELL-4,CELL-8,6);ctx.fill();
        ctx.fillStyle='#a07040';ctx.fillRect(o.x+4,r*CELL+8,o.w*CELL-12,CELL-20);
      } else {
        const colors=['#ff4444','#4444ff','#ffaa00','#ff44aa'];
        ctx.fillStyle=colors[r-6];ctx.beginPath();ctx.roundRect(o.x+2,r*CELL+8,o.w*CELL-4,CELL-16,4);ctx.fill();
        ctx.fillStyle='rgba(255,255,255,.4)';ctx.fillRect(o.x+6,r*CELL+10,o.w*CELL-20,8);
        ctx.fillStyle='#ffff88';ctx.beginPath();if(l.dir>0){ctx.arc(o.x+o.w*CELL-8,r*CELL+CELL/2,4,0,Math.PI*2);}else{ctx.arc(o.x+8,r*CELL+CELL/2,4,0,Math.PI*2);}ctx.fill();
      }
    });
  });
  // frog
  if(!frog.dead){
    ctx.fillStyle='#44cc44';ctx.beginPath();ctx.ellipse(frog.x,frog.y,12,10,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#22aa22';ctx.fillRect(frog.x-10,frog.y-4,8,8);ctx.fillRect(frog.x+2,frog.y-4,8,8);
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(frog.x-5,frog.y-8,4,0,Math.PI*2);ctx.arc(frog.x+5,frog.y-8,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#111';ctx.beginPath();ctx.arc(frog.x-5,frog.y-8,2,0,Math.PI*2);ctx.arc(frog.x+5,frog.y-8,2,0,Math.PI*2);ctx.fill();
  } else {
    ctx.fillStyle='#ff4444';ctx.font='24px serif';ctx.textAlign='center';ctx.fillText('💀',frog.x,frog.y+8);
  }
  if(state==='over'||state==='win'){
    ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(0,0,COLS*CELL,ROWS*CELL);
    ctx.fillStyle='#88ff88';ctx.font='bold 28px Courier New';ctx.textAlign='center';
    ctx.fillText(state==='win'?'YOU WIN! 🎉':'GAME OVER',COLS*CELL/2,ROWS*CELL/2-15);
    ctx.font='14px Courier New';ctx.fillText('Score: '+score+' · Press any key',COLS*CELL/2,ROWS*CELL/2+15);
  }
}
function loop(){update();draw();requestAnimationFrame(loop);}
document.addEventListener('keydown',e=>{
  if(state==='over'||state==='win'){init(1);return;}
  if(state!=='play'||frog.dead)return;
  const step=CELL;
  if(e.key==='ArrowUp'||e.key==='w'){frog.y-=step;score+=1;document.getElementById('score').textContent=score;}
  else if(e.key==='ArrowDown'||e.key==='s')frog.y=Math.min(10*CELL+CELL/2,frog.y+step);
  else if(e.key==='ArrowLeft'||e.key==='a')frog.x=Math.max(CELL/2,frog.x-step);
  else if(e.key==='ArrowRight'||e.key==='d')frog.x=Math.min(COLS*CELL-CELL/2,frog.x+step);
  e.preventDefault();
});
init();loop();
</script>
</body>
</html>
